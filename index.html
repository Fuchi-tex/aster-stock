<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易庫存查詢系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex flex-col items-center">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 mt-4">
    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2 mb-2">🔍 簡易庫存查詢</h2>
    
    <div class="text-base font-semibold text-amber-600 mb-2">
         &gt;&gt;&gt;如需詳細庫存請來電洽詢
    </div>
    
    <p id="updateTimeArea" class="text-xs text-emerald-600 bg-emerald-50 inline-block px-2.5 py-1 rounded-md mb-6 font-medium">
      正在載入最新資料庫時間...
    </p>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">請輸入貨號</label>
        <input type="text" id="itemCodeInput" placeholder="例如：A27911, 或 A279*" 
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 text-lg focus:outline-none">
        <p class="text-xs text-gray-400 mt-1">※ 支援輸入前4碼自動搜尋，或使用 * 字尾模糊查詢</p>
      </div>
      <button id="queryBtn" onclick="startQuery()" class="w-full bg-emerald-600 text-white font-medium py-3 px-4 rounded-xl shadow-md hover:bg-emerald-700 active:scale-98 transition">
        開始查詢庫存
      </button>
    </div>

    <div id="resultArea" class="mt-6 space-y-4 hidden">
      <div class="h-px bg-gray-200 my-4"></div>
      <h3 class="font-bold text-gray-700">查詢結果：</h3>
      <div id="resultList" class="space-y-3"></div>
    </div>
  </div>

  <script>
    // 💡 請在此處填入您在 GAS 部署得到的最新網址 (exec 結尾)
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbx0syzuHvlscHPvQFFyXUqMp5aj-7HdnaeF8Rwdv0fzxK41doT_BlRoUcbPt5cwv-iGoA/exec'; 

    let cachedInventoryData = null;

    // 網頁開啟時，自動抓取 json
    window.onload = function() {
      fetch('inventory.json?t=' + new Date().getTime()) 
        .then(res => res.json())
        .then(package => {
          cachedInventoryData = package.items; 
          if(package.updateTime) {
            document.getElementById('updateTimeArea').innerText = '⏰ 最後更新時間：' + package.updateTime;
          }
        })
        .catch(err => {
          document.getElementById('updateTimeArea').innerText = '❌ 資料庫載入失敗，請先至 GAS 執行 importMyCSV';
        });
    };

    function startQuery() {
      const inputVal = document.getElementById('itemCodeInput').value.trim();
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');

      if (!inputVal) return alert('請先輸入貨號！');
      if (!cachedInventoryData) return alert('系統資料正在準備中，請稍候...');

      resultArea.classList.remove('hidden');
      resultList.innerHTML = '';

      const rawTokens = inputVal.split(/\s+/);
      const matchedItems = []; 
      const missedCodes = [];  
      const loggedCodes = [];  

      rawTokens.forEach(token => {
        if (!token) return;
        let query = token.toUpperCase();
        loggedCodes.push(query);

        if (query.includes('*')) {
          let prefix = query.replace(/\*/g, ''); 
          if(prefix.length < 2) {
            alert('為了系統效能，模糊查詢請至少輸入2個字以上（例如: A1*）');
            return;
          }
          let foundAny = false;
          for (let code in cachedInventoryData) {
            if (code.startsWith(prefix)) {
              matchedItems.push(cachedInventoryData[code]);
              foundAny = true;
            }
          }
          if (!foundAny) missedCodes.push(token);
        } 
        else if (query.length === 4) {
          let foundAny = false;
          for (let code in cachedInventoryData) {
            if (code.startsWith(query)) {
              matchedItems.push(cachedInventoryData[code]);
              foundAny = true;
            }
          }
          if (!foundAny) missedCodes.push(token);
        } 
        else {
          if (cachedInventoryData[query]) {
            matchedItems.push(cachedInventoryData[query]);
          } else {
            missedCodes.push(token);
          }
        }
      });

      const uniqueMatchedItems = Array.from(new Set(matchedItems.map(a => a.itemCode)))
        .map(id => matchedItems.find(a => a.itemCode === id));

      uniqueMatchedItems.forEach(item => {
        let html = `
          <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 space-y-1.5 shadow-sm">
            <div class="flex justify-between items-center"><span class="font-bold text-emerald-800 text-xl">🏷️ 貨號：${item.itemCode}</span><span class="bg-emerald-600 text-white text-xs px-2 py-0.5 rounded-full font-bold">有庫存</span></div>
            <p class="text-base text-gray-700 font-medium">💰 牌價：<span class="text-red-500 text-lg font-bold">$${item.listPrice}</span></p>
            <p class="text-base text-gray-700 font-medium">🔢 數量：<span class="text-emerald-700 text-xl font-bold">${item.qty}</span> ${item.unit}</p>
          </div>`;
        resultList.insertAdjacentHTML('beforeend', html);
      });

      missedCodes.forEach(code => {
        let html = `
          <div class="bg-red-50 border border-red-200 rounded-xl p-4 shadow-sm">
            <span class="font-bold text-red-800 text-lg">❌ 查無符合：${code}</span>
            <p class="text-sm text-red-600 mt-1">找不到符合該條件之庫存資料。</p>
          </div>`;
        resultList.insertAdjacentHTML('beforeend', html);
      });

      if (uniqueMatchedItems.length === 0 && missedCodes.length === 0) {
        resultList.innerHTML = '<p class="text-sm text-gray-500">請輸入有效的貨號格式。</p>';
      }

      if (loggedCodes.length > 0) {
        fetch(GAS_API_URL, {
          method: 'POST',
          mode: 'no-cors', 
          body: JSON.stringify({ itemCodes: loggedCodes })
        }).catch(err => console.log(err));
      }
    }
  </script>
</body>
</html>
