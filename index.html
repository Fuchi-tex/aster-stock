<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易庫存查詢</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex flex-col items-center">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 mt-4">
    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2 mb-2">🔍 簡易庫存查詢</h2>
    <p class="text-sm text-gray-500 mb-6">請在下方輸入貨號（支援多筆，如 A1234 C5678）</p>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">請輸入貨號</label>
        <input type="text" id="itemCodeInput" placeholder="例如：A1234 或 C99999" 
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 text-lg">
      </div>
      <button id="queryBtn" onclick="startQuery()" class="w-full bg-emerald-600 text-white font-medium py-3 px-4 rounded-xl shadow-md">
        開始查詢庫存
      </button>
    </div>

    <div id="resultArea" class="mt-6 space-y-4 hidden">
      <div class="h-px bg-gray-200 my-4"></div>
      <h3 class="font-bold text-gray-700">查詢結果：</h3>
      <div id="resultList" class="space-y-3"></div>
    </div>
  </div>

  <script>
    // ⚡ 終極加速：當網頁打開時，0.1秒內先把 GitHub Pages 同目錄下的 inventory.json 整個載入到手機記憶體中
    let cachedInventoryData = null;

    window.onload = function() {
      // 讀取同資料夾底下的 json 檔（不需要寫死網址，它會自動抓取同目錄檔案）
      fetch('inventory.json')
        .then(res => res.json())
        .then(data => {
          cachedInventoryData = data;
          console.log('庫存資料庫載入成功！');
        })
        .catch(err => console.error('載入資料庫失敗，請確認 inventory.json 是否已生成:', err));
    };

    function startQuery() {
      const inputVal = document.getElementById('itemCodeInput').value.trim();
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');

      if (!inputVal) return alert('請先輸入貨號！');
      if (!cachedInventoryData) return alert('系統資料正在準備中，請稍候 3 秒再試。');

      resultArea.classList.remove('hidden');
      resultList.innerHTML = '';

      // 正則比對貨號
      const regex = /[AaCc]\d{4,5}[A-Za-z]*/g;
      const matches = inputVal.match(regex);

      if (!matches) {
        alert('輸入格式不符（範例：A1234）');
        return;
      }

      const targetItemCodes = [...new Set(matches.map(code => code.toUpperCase()))];

      // ⚡ 奇蹟發生的時刻：因為資料已經在手機記憶體裡了，比對 1500 筆只需要 0.001 秒！
      targetItemCodes.forEach(targetItemCode => {
        const item = cachedInventoryData[targetItemCode];
        
        let html = item ? `
          <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 space-y-1.5">
            <div class="flex justify-between items-center"><span class="font-bold text-emerald-800 text-xl">📌 貨號：${item.itemCode}</span><span class="bg-emerald-600 text-white text-xs px-2 py-0.5 rounded-full font-bold">有庫存</span></div>
            <p class="text-base text-gray-700 font-medium">💰 牌價：<span class="text-red-500 text-lg font-bold">$${item.listPrice}</span></p>
            <p class="text-base text-gray-700 font-medium">📊 數量：<span class="text-emerald-700 text-xl font-bold">${item.qty}</span> ${item.unit}</p>
          </div>` : `
          <div class="bg-red-50 border border-red-200 rounded-xl p-4"><span class="font-bold text-red-800 text-lg">❌ 貨號：${targetItemCode}</span><p class="text-sm text-red-600 mt-1">找不到該貨號之庫存資料。</p></div>`;
        
        resultList.insertAdjacentHTML('beforeend', html);
      });
    }
  </script>
</body>
</html>
